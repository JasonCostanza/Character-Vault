<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attribute Wizard — Design Preview</title>
<style>

/* ── CV Color Tokens (dark theme default) ── */
:root,
html[data-theme="dark"] {
    --cv-bg:               #1C1C1C;
    --cv-bg-surface:       #252525;
    --cv-bg-raised:        #2E2E2E;
    --cv-bg-sunken:        #141414;
    --cv-text:             #E8DCC8;
    --cv-text-secondary:   #B0A090;
    --cv-text-muted:       #6A5A4A;
    --cv-border:           #3A3530;
    --cv-border-subtle:    #2A2520;
    --cv-accent:           #C0874A;
    --cv-accent-hover:     #D9A060;
    --cv-accent-secondary: #A06838;
    --cv-success:          #5A9E6E;
    --cv-danger:           #B84040;
    --cv-focus-ring:       #C0874A80;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background: var(--cv-bg);
    color: var(--cv-text);
    font-family: system-ui, 'Segoe UI', sans-serif;
    font-size: 13px;
    line-height: 1.4;
    min-height: 100vh;
}

.icon {
    fill: none;
    stroke: currentColor;
    stroke-linecap: round;
    stroke-linejoin: round;
    flex-shrink: 0;
}

/* ── Wizard Overlay ── */
.attr-wizard-overlay {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: var(--cv-bg);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.attr-wizard-overlay::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, var(--cv-bg-sunken) 100%);
    pointer-events: none;
}

.attr-wizard-panel {
    position: relative;
    display: flex;
    flex-direction: column;
    height: 100%;
    max-width: 380px;
    width: 100%;
    margin: 0 auto;
    padding: 0 24px;
}

/* ── Header ── */
.attr-wizard-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 0;
    border-bottom: 1px solid var(--cv-border);
    flex-shrink: 0;
}

.attr-wizard-title {
    font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--cv-accent);
    user-select: none;
}

.attr-wizard-close {
    background: none;
    border: none;
    color: var(--cv-text-muted);
    cursor: pointer;
    padding: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    transition: color 0.15s ease;
}
.attr-wizard-close:hover { color: var(--cv-text); }

/* ── Body ── */
.attr-wizard-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px 0 4px;
    scrollbar-width: thin;
    scrollbar-color: var(--cv-text-muted) transparent;
}
.attr-wizard-body::-webkit-scrollbar { width: 4px; }
.attr-wizard-body::-webkit-scrollbar-track { background: transparent; }
.attr-wizard-body::-webkit-scrollbar-thumb { background: var(--cv-text-muted); border-radius: 2px; }

.attr-wizard-section {
    margin-bottom: 22px;
    padding-bottom: 22px;
    border-bottom: 1px solid var(--cv-border-subtle);
}
.attr-wizard-section:last-child {
    border-bottom: none;
    margin-bottom: 0;
}

.attr-wizard-label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--cv-text-secondary);
    margin-bottom: 10px;
    user-select: none;
}
.attr-wizard-label-note {
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0;
    font-size: 10px;
    color: var(--cv-text-muted);
}

/* ── Name Input ── */
.attr-wizard-name-input {
    width: 100%;
    background: var(--cv-bg-sunken);
    border: 1px solid var(--cv-border);
    border-radius: 4px;
    color: var(--cv-text);
    font-size: 13px;
    padding: 8px 10px;
    outline: none;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
    font-family: inherit;
}
.attr-wizard-name-input::placeholder { color: var(--cv-text-muted); }
.attr-wizard-name-input:focus {
    border-color: var(--cv-accent);
    box-shadow: 0 0 0 2px var(--cv-focus-ring);
}

/* ── Type Cards ── */
.attr-wizard-type-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
}

.attr-wizard-type-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    padding: 12px 8px;
    background: var(--cv-bg-raised);
    border: 1px solid var(--cv-border);
    border-radius: 6px;
    cursor: pointer;
    transition: border-color 0.15s ease, background-color 0.15s ease;
    user-select: none;
    font-family: inherit;
}
.attr-wizard-type-card:hover:not(.selected) {
    border-color: var(--cv-accent-secondary);
    background: var(--cv-bg-surface);
}
.attr-wizard-type-card.selected {
    border-color: var(--cv-accent);
    background: rgba(192, 135, 74, 0.08);
}

.attr-wizard-type-glyph {
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 700;
    color: var(--cv-text-muted);
    font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif;
    transition: color 0.15s ease;
}
.attr-wizard-type-card.selected .attr-wizard-type-glyph { color: var(--cv-accent); }

.attr-wizard-type-name {
    font-size: 11px;
    font-weight: 600;
    color: var(--cv-text);
    text-align: center;
    user-select: none;
}
.attr-wizard-type-desc {
    font-size: 10px;
    color: var(--cv-text-muted);
    text-align: center;
    user-select: none;
    line-height: 1.3;
}

/* ── Icon Grid ── */
.attr-wizard-icon-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
}

.attr-wizard-icon-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    aspect-ratio: 1;
    background: var(--cv-bg-raised);
    border: 1px solid var(--cv-border);
    border-radius: 5px;
    cursor: pointer;
    color: var(--cv-text-secondary);
    transition: border-color 0.15s ease, color 0.15s ease, background-color 0.15s ease;
    position: relative;
    font-family: inherit;
}
.attr-wizard-icon-btn:hover {
    border-color: var(--cv-accent-secondary);
    color: var(--cv-text);
}
.attr-wizard-icon-btn.selected {
    border-color: var(--cv-accent);
    background: rgba(192, 135, 74, 0.12);
    color: var(--cv-accent);
}
.attr-wizard-icon-btn[data-icon-key=""] {
    font-size: 14px;
    font-weight: 700;
    color: var(--cv-text-muted);
    font-family: 'Palatino Linotype', serif;
}
.attr-wizard-icon-btn[data-icon-key=""].selected {
    color: var(--cv-accent);
}

/* CSS tooltip (native title doesn't render in TaleSpire's Chromium) */
.attr-wizard-icon-btn::after {
    content: attr(title);
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--cv-bg-raised);
    border: 1px solid var(--cv-border);
    color: var(--cv-text-secondary);
    font-size: 10px;
    white-space: nowrap;
    padding: 3px 7px;
    border-radius: 3px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.1s ease;
    z-index: 10;
}
.attr-wizard-icon-btn:hover::after { opacity: 1; }

/* ── Footer ── */
.attr-wizard-footer {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 14px 0;
    border-top: 1px solid var(--cv-border);
    flex-shrink: 0;
}

.attr-wizard-btn-cancel {
    background: none;
    border: 1px solid var(--cv-border);
    border-radius: 4px;
    color: var(--cv-text-secondary);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 8px 16px;
    cursor: pointer;
    transition: border-color 0.15s ease, color 0.15s ease;
    user-select: none;
    font-family: inherit;
}
.attr-wizard-btn-cancel:hover {
    border-color: var(--cv-text-muted);
    color: var(--cv-text);
}

.attr-wizard-btn-create {
    flex: 1;
    background: var(--cv-accent);
    border: none;
    border-radius: 4px;
    color: var(--cv-bg-sunken);
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 8px 16px;
    cursor: pointer;
    transition: background-color 0.15s ease;
    user-select: none;
    font-family: inherit;
}
.attr-wizard-btn-create:hover:not(:disabled) { background: var(--cv-accent-hover); }
.attr-wizard-btn-create:disabled {
    background: var(--cv-bg-raised);
    color: var(--cv-text-muted);
    cursor: not-allowed;
}

</style>
</head>
<body>

<div class="attr-wizard-overlay">
  <div class="attr-wizard-panel">

    <!-- Header -->
    <div class="attr-wizard-header">
      <span class="attr-wizard-title">New Attribute</span>
      <button class="attr-wizard-close" title="Close">
        <svg class="icon" width="16" height="16" viewBox="0 0 24 24" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- Body -->
    <div class="attr-wizard-body">

      <!-- Section: Name -->
      <div class="attr-wizard-section">
        <label class="attr-wizard-label" for="attr-name">Name</label>
        <input id="attr-name" class="attr-wizard-name-input" type="text"
               placeholder="e.g. Charges, Rarity, Condition…" autocomplete="off" />
      </div>

      <!-- Section: Type -->
      <div class="attr-wizard-section">
        <span class="attr-wizard-label">Type</span>
        <div class="attr-wizard-type-grid">

          <button class="attr-wizard-type-card selected" data-type="toggle">
            <div class="attr-wizard-type-glyph" id="glyph-toggle"></div>
            <span class="attr-wizard-type-name">Toggle</span>
            <span class="attr-wizard-type-desc">On / off state</span>
          </button>

          <button class="attr-wizard-type-card" data-type="number">
            <div class="attr-wizard-type-glyph">42</div>
            <span class="attr-wizard-type-name">Number</span>
            <span class="attr-wizard-type-desc">Single value</span>
          </button>

          <button class="attr-wizard-type-card" data-type="number-pair">
            <div class="attr-wizard-type-glyph" style="font-size:12px; letter-spacing:-0.02em;">8 / 10</div>
            <span class="attr-wizard-type-name">Number Pair</span>
            <span class="attr-wizard-type-desc">Value &amp; maximum</span>
          </button>

          <button class="attr-wizard-type-card" data-type="text">
            <div class="attr-wizard-type-glyph" style="font-style:italic;">Aa</div>
            <span class="attr-wizard-type-name">Text</span>
            <span class="attr-wizard-type-desc">Short label</span>
          </button>

        </div>
      </div>

      <!-- Section: Icon -->
      <div class="attr-wizard-section">
        <span class="attr-wizard-label">Icon <span class="attr-wizard-label-note">— optional</span></span>
        <div class="attr-wizard-icon-grid" id="icon-grid"></div>
      </div>

    </div><!-- /body -->

    <!-- Footer -->
    <div class="attr-wizard-footer">
      <button class="attr-wizard-btn-cancel">Cancel</button>
      <button class="attr-wizard-btn-create" id="btn-create" disabled>Create</button>
    </div>

  </div>
</div>

<script>

var selectedType = 'toggle';
var selectedIcon = null;

// ── Icon Library ──
// key: null = no icon; otherwise matches LIST_ICON_SVG keys
var ICONS = [
  { key: null,      label: 'None' },
  { key: 'scale',   label: 'Balance Scale',    svg: '<line x1="12" y1="3" x2="12" y2="21"/><polyline points="4 7 12 3 20 7"/><line x1="4" y1="7" x2="4" y2="13"/><line x1="20" y1="7" x2="20" y2="13"/><path d="M4 13a4 4 0 0 0 8 0"/><path d="M12 13a4 4 0 0 0 8 0"/>' },
  { key: 'power',   label: 'Power Button',     svg: '<path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/>' },
  { key: 'apple',   label: 'Apple',            svg: '<path d="M12 2c1-1 3-1.5 4 0"/><path d="M17 6c2 2 3 5 2.5 9s-2.5 6-5.5 7c-1 .3-1.7.3-2 0-3-1-5-3-5.5-7S7 8 9 6c1-1 3-1 4 0s2-.5 4 0z"/>' },
  { key: 'bread',   label: 'Bread',            svg: '<path d="M4 16c0-5 2-9 8-9s8 4 8 9l-1 2H5l-1-2z"/><line x1="8" y1="12" x2="8" y2="17"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="16" y1="12" x2="16" y2="17"/>' },
  { key: 'bottle',  label: 'Bottle of Water',  svg: '<path d="M10 3h4v3l1.5 2.5V20a1 1 0 01-1 1H9.5a1 1 0 01-1-1V8.5L10 6V3z"/><line x1="9.5" y1="13" x2="14.5" y2="13"/>' },
  { key: 'magnify', label: 'Magnifying Glass', svg: '<circle cx="10" cy="10" r="7"/><line x1="15.5" y1="15.5" x2="21" y2="21"/>' },
  { key: 'torch',   label: 'Torch',            svg: '<rect x="10" y="14" width="4" height="7" rx="1"/><path d="M12 14c-3-4-1-9 0-11 1 2 3 7 0 11z"/>' },
  { key: 'flash',   label: 'Flashlight',       svg: '<rect x="9" y="9" width="6" height="10" rx="1"/><path d="M8 9L6 5h12l-2 4"/><circle cx="12" cy="15" r="1.5" fill="currentColor" stroke="none"/>' },
  { key: 'armour',  label: 'Armour',           svg: '<path d="M12 2L3 7v6c0 5.25 3.75 9.5 9 11 5.25-1.5 9-5.75 9-11V7l-9-5z"/>' },
  { key: 'helmet',  label: 'Helmet',           svg: '<path d="M12 2C7 2 3 6 3 11v3h2v-1a7 7 0 0 1 14 0v1h2v-3c0-5-4-9-9-9z"/><rect x="3" y="14" width="18" height="4" rx="1"/>' },
  { key: 'boots',   label: 'Boots',            svg: '<path d="M8 3v13l-3 4h12v-3l-3-3V3H8z"/><line x1="8" y1="11" x2="14" y2="11"/>' },
  { key: 'gloves',  label: 'Gloves',           svg: '<path d="M9 17V8a1.5 1.5 0 013 0v5"/><path d="M12 11V7a1.5 1.5 0 013 0v4"/><path d="M15 11V8.5a1.5 1.5 0 013 0V17a5 5 0 01-10 0v-2.5a1.5 1.5 0 013 0"/>' },
  { key: 'shirt',   label: 'T-Shirt',          svg: '<polyline points="3 8 7 4 9.5 7 12 4 14.5 7 17 4 21 8 18 10 18 20 6 20 6 10 3 8"/>' },
  { key: 'pants',   label: 'Pants',            svg: '<path d="M4 4h16l-2 10h-4l-2 6-2-6H6L4 4z"/>' },
  { key: 'shoes',   label: 'Shoes',            svg: '<path d="M3 16l1-6h5l2 3h10v3H3z"/><line x1="4" y1="13" x2="6" y2="13"/>' },
  { key: 'gun',     label: 'Gun',              svg: '<path d="M4 10h10v4l4 1v2h-5v-2H4v-5z"/><line x1="14" y1="10" x2="17" y2="8"/><rect x="5" y="14" width="2" height="4" rx="1"/>' },
  { key: 'sword',   label: 'Sword',            svg: '<line x1="17" y1="2" x2="7" y2="18"/><line x1="21" y1="6" x2="12" y2="6"/><path d="M5 20l2-2"/><path d="M3 22l2-2"/>' },
  { key: 'dagger',  label: 'Dagger',           svg: '<line x1="12" y1="2" x2="12" y2="17"/><line x1="8" y1="8" x2="16" y2="8"/><path d="M10 17 Q12 21 14 17"/>' },
  { key: 'wand',    label: 'Wand',             svg: '<line x1="4" y1="20" x2="16" y2="8"/><polyline points="16 8 19 5 21 7 18 10 16 8"/><line x1="20" y1="3" x2="22" y2="5"/><line x1="18" y1="2" x2="18" y2="4"/><line x1="22" y1="6" x2="20" y2="6"/>' },
  { key: 'staff',   label: 'Staff',            svg: '<line x1="12" y1="3" x2="12" y2="21"/><path d="M9 6Q12 3 15 6"/><circle cx="12" cy="10" r="2"/><path d="M9 18Q12 21 15 18"/>' },
  { key: 'coin',    label: 'Coin',             svg: '<circle cx="12" cy="12" r="9"/><line x1="12" y1="6" x2="12" y2="18"/><path d="M9 9h3.5a2 2 0 010 4H9m0 0h4a2 2 0 010 4H9"/>' },
  { key: 'potion',  label: 'Potion',           svg: '<path d="M9 3h6v3l4 7A6 6 0 015 13l4-7V3z"/><line x1="8" y1="9" x2="16" y2="9"/><circle cx="10" cy="14" r="1" fill="currentColor" stroke="none"/><circle cx="14" cy="16" r="1" fill="currentColor" stroke="none"/>' },
  { key: 'key',     label: 'Key',              svg: '<circle cx="8" cy="9" r="5"/><line x1="13" y1="9" x2="21" y2="9"/><line x1="17" y1="9" x2="17" y2="12"/><line x1="20" y1="9" x2="20" y2="11"/>' },
  { key: 'gem',     label: 'Gem',              svg: '<path d="M5 4h14l3 5-10 13L2 9l3-5z"/><line x1="2" y1="9" x2="22" y2="9"/>' },
  { key: 'bow',     label: 'Bow',              svg: '<path d="M5 4 Q1 12 5 20"/><line x1="5" y1="4" x2="5" y2="20"/><line x1="5" y1="12" x2="20" y2="12"/><polyline points="16 9 20 12 16 15"/>' },
  { key: 'axe',     label: 'Axe',              svg: '<line x1="6" y1="18" x2="15" y2="9"/><path d="M15 9 Q15 3 21 3 Q21 9 15 9"/>' },
  { key: 'shield',  label: 'Shield',           svg: '<circle cx="12" cy="12" r="9"/><line x1="12" y1="3" x2="12" y2="21"/><line x1="3" y1="12" x2="21" y2="12"/>' },
];

// ── Build Icon Grid ──
var grid = document.getElementById('icon-grid');
ICONS.forEach(function (ic) {
    var btn = document.createElement('button');
    btn.className = 'attr-wizard-icon-btn' + (ic.key === null ? ' selected' : '');
    btn.dataset.iconKey = ic.key || '';
    btn.title = ic.label;
    if (ic.key === null) {
        btn.textContent = '—';
    } else {
        btn.innerHTML = '<svg class="icon" width="16" height="16" viewBox="0 0 24 24" stroke-width="2">' + ic.svg + '</svg>';
    }
    btn.addEventListener('click', function () {
        grid.querySelectorAll('.attr-wizard-icon-btn').forEach(function (b) { b.classList.remove('selected'); });
        btn.classList.add('selected');
        selectedIcon = ic.key;
    });
    grid.appendChild(btn);
});

// ── Type Card Selection ──
document.querySelectorAll('.attr-wizard-type-card').forEach(function (card) {
    card.addEventListener('click', function () {
        document.querySelectorAll('.attr-wizard-type-card').forEach(function (c) { c.classList.remove('selected'); });
        card.classList.add('selected');
        selectedType = card.dataset.type;
    });
});

// Inject toggle SVG into the Toggle type card glyph
document.getElementById('glyph-toggle').innerHTML =
    '<svg class="icon" width="22" height="13" viewBox="0 0 36 22" stroke-width="2.5">' +
    '<rect x="1" y="1" width="34" height="20" rx="10"/>' +
    '<circle cx="26" cy="11" r="7" fill="currentColor" stroke="none"/>' +
    '</svg>';

// ── Create Button: enable when name is non-empty ──
var nameInput = document.getElementById('attr-name');
var createBtn = document.getElementById('btn-create');
nameInput.addEventListener('input', function () {
    createBtn.disabled = nameInput.value.trim().length === 0;
});

</script>
</body>
</html>
